version: '3.8'

services:
  backend-admin:
    image: ghcr.io/akephisit/schoolorbit-backend-admin:latest
    container_name: schoolorbit-backend-admin
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database and tenant provisioning
      - DATABASE_URL=${DATABASE_URL}
      - SELF_HOSTED_POSTGRES_ADMIN_URL=${SELF_HOSTED_POSTGRES_ADMIN_URL}
      - SELF_HOSTED_POSTGRES_APP_HOST=${SELF_HOSTED_POSTGRES_APP_HOST:-postgres}
      - SELF_HOSTED_POSTGRES_APP_PORT=${SELF_HOSTED_POSTGRES_APP_PORT:-5432}
      - SELF_HOSTED_POSTGRES_TENANT_USER=${SELF_HOSTED_POSTGRES_TENANT_USER}
      - SELF_HOSTED_POSTGRES_TENANT_PASSWORD=${SELF_HOSTED_POSTGRES_TENANT_PASSWORD}
      - SELF_HOSTED_POSTGRES_SSLMODE=${SELF_HOSTED_POSTGRES_SSLMODE:-disable}
      - JWT_SECRET=${JWT_SECRET}

      # Cloudflare (for Workers deployment & DNS)
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - BASE_DOMAIN=${BASE_DOMAIN:-schoolorbit.app}

      # Backend-School Communication
      - BACKEND_SCHOOL_URL=${BACKEND_SCHOOL_URL:-http://backend-school:8081}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}

      # Deployment (GitHub Actions)
      - API_URL=${API_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-akephisit/schoolorbit-new}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-akephisit/schoolorbit-new}

      # General
      - RUST_LOG=${RUST_LOG:-info}
    networks:
      - web_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  web_network:
    external: true
    name: stack_web
