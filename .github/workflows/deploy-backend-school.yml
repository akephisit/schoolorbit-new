name: Deploy Backend School

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend-school/**'
      - '.github/workflows/deploy-backend-school.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: akephisit/schoolorbit-backend-school

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long

      # Re-enable Buildx with robust config
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend-school
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/stack
            
            # 1. Pull latest image specifically
            podman pull ghcr.io/akephisit/schoolorbit-backend-school:latest
            
            # 2. Force Stop & Remove old container
            podman stop schoolorbit-backend-school || true
            podman rm schoolorbit-backend-school || true
            
            # 3. Start new container using podman-compose (it will recreate because container is gone)
            # We don't specify service name argument if it causes issues, 
            # or we rely on the fact that missing container forces recreation.
            podman-compose up -d backend-school

            # 4. Wait for control-plane readiness (maximum 60 seconds)
            if ! timeout 60 bash -c '
              for attempt in $(seq 1 12); do
                if curl -fsS "$1" >/dev/null; then
                  exit 0
                fi
                if [ "$attempt" -lt 12 ]; then
                  sleep 5
                fi
              done
              exit 1
            ' _ http://127.0.0.1:8081/ready; then
              podman logs --tail 100 schoolorbit-backend-school
              exit 1
            fi
            
            # 5. Clean up
            podman image prune -f
            
            # 6. Reload Nginx to update DNS/IPs
            podman exec schoolorbit-nginx nginx -s reload || true
