name: Smoke Test Sandbox

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: Tenant subdomain to test
        required: true
        default: sandbox
      api_url:
        description: Backend school API URL
        required: true
        default: https://school-api.schoolorbit.app
      admin_api_url:
        description: Backend admin API URL
        required: true
        default: https://admin-api.schoolorbit.app
      tenant_url:
        description: Optional full tenant URL override
        required: false
        default: ''
      origin:
        description: Optional CORS Origin override
        required: false
        default: ''
      timeout_seconds:
        description: Curl timeout per request
        required: true
        default: '20'
      run_authenticated:
        description: Run login and authenticated /me checks
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: smoke-test-${{ inputs.subdomain }}
  cancel-in-progress: false

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SMOKE_SUBDOMAIN: ${{ inputs.subdomain }}
      SMOKE_API_URL: ${{ inputs.api_url }}
      SMOKE_ADMIN_API_URL: ${{ inputs.admin_api_url }}
      SMOKE_TENANT_URL: ${{ inputs.tenant_url }}
      SMOKE_ORIGIN: ${{ inputs.origin }}
      SMOKE_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
      SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Require sandbox credentials
        if: ${{ inputs.run_authenticated == true }}
        shell: bash
        run: |
          if [ -z "${SMOKE_USERNAME:-}" ] || [ -z "${SMOKE_PASSWORD:-}" ]; then
            echo "::error::Set SMOKE_USERNAME and SMOKE_PASSWORD repository secrets, or run with run_authenticated=false."
            exit 1
          fi

      - name: Run smoke test
        shell: bash
        run: |
          if [ "${{ inputs.run_authenticated }}" != "true" ]; then
            unset SMOKE_USERNAME
            unset SMOKE_PASSWORD
          fi

          ./scripts/smoke_test.sh
