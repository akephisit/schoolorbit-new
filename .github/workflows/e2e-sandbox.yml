name: E2E Sandbox

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Tenant URL to test
        required: true
        default: https://sandbox.schoolorbit.app

permissions:
  contents: read

concurrency:
  group: e2e-sandbox-${{ inputs.base_url }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      E2E_BASE_URL: ${{ inputs.base_url }}
      E2E_USERNAME: ${{ secrets.SMOKE_USERNAME }}
      E2E_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-school/package-lock.json

      - name: Install dependencies
        working-directory: frontend-school
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend-school
        run: npx playwright install --with-deps chromium

      - name: Require sandbox credentials
        shell: bash
        run: |
          if [ -z "${E2E_USERNAME:-}" ] || [ -z "${E2E_PASSWORD:-}" ]; then
            echo "::error::Set SMOKE_USERNAME and SMOKE_PASSWORD repository secrets before running E2E Sandbox."
            exit 1
          fi

      - name: Run E2E tests
        working-directory: frontend-school
        run: npm run test:e2e
