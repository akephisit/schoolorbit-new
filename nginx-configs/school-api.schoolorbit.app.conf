# --------------------------------------------------------
# 1. MAP SECTION: ประกาศกฎการอนุญาตที่นี่ที่เดียว
# --------------------------------------------------------
map $http_origin $allow_origin {
    default ""; # ค่าเริ่มต้นคือ "ไม่ให้เข้า"

    # ✅ กฎที่ 1: อนุญาต *.schoolorbit.app ทั้งหมด (Regex) และยอมรับ port อะไรก็ได้
    "~^https://([\w-]+\.)?schoolorbit\.app(:[0-9]+)?$" $http_origin;

    # ✅ กฎที่ 2: อนุญาต Localhost (เผื่อ Dev ในเครื่องตัวเอง)
    "http://localhost:3000" $http_origin;
    "http://127.0.0.1:3000" $http_origin;

    # ✅ กฎที่ 3: (อนาคต) ถ้ามีเว็บอื่นเพิ่ม ก็มาเติมบรรทัดนี้ ไม่ต้องแก้ข้างล่าง
    # "https://www.future-partner.com" $http_origin;

    # ⚠️ กฎพิเศษ: ถ้าอยากให้ "ใครก็ได้ในโลก" เรียกได้ (Public API) ให้เปิดบรรทัดนี้
    # "~^https://.*$" $http_origin;
}

# --------------------------------------------------------
# SERVER BLOCK
# --------------------------------------------------------
server {
    listen 80;
    server_name school-api.schoolorbit.app;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name school-api.schoolorbit.app;

    ssl_certificate /etc/letsencrypt/live/school-api.schoolorbit.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/school-api.schoolorbit.app/privkey.pem;

    # ========================================
    # 🔥 GLOBAL FILE UPLOAD SETTINGS (สำคัญมาก!)
    # ========================================
    # เพิ่ม max file size ทั้ง server block
    client_max_body_size 20M;
    
    # Timeout settings สำหรับการ upload ไฟล์ขนาดใหญ่
    client_body_timeout 300s;
    client_header_timeout 300s;
    
    # Proxy timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ========================================
    # 🆕 FILE UPLOAD ENDPOINT (เพิ่มใหม่ - ต้องมาก่อน location /)
    # ========================================
    location /api/files/ {
        proxy_pass http://schoolorbit-backend-school:8081;
        
        # 🔥 Critical settings for file uploads
        client_max_body_size 20M;
        client_body_buffer_size 256k;
        
        # ปิด buffering เพื่อให้ stream upload ตรงไปที่ backend
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Extended timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # HTTP version สำหรับ chunked transfer
        proxy_http_version 1.1;
        
        # Proxy Headers (สำคัญ!)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length $content_length;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' $allow_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ========================================
    # 🆕 ADMISSION PORTAL UPLOAD ENDPOINT
    # ========================================
    location /api/admission/portal/upload {
        proxy_pass http://schoolorbit-backend-school:8081;

        # 🔥 Critical settings for file uploads (เหมือน /api/files/)
        client_max_body_size 20M;
        client_body_buffer_size 256k;

        # ปิด buffering เพื่อให้ stream upload ตรงไปที่ backend
        proxy_request_buffering off;
        proxy_buffering off;

        # Extended timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # HTTP version สำหรับ chunked transfer
        proxy_http_version 1.1;

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Length $content_length;
        proxy_set_header X-Forwarded-Host $server_name;

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' $allow_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # --------------------------------------------------------
    # 🆕 SSE ENDPOINTS (ต้องมาก่อน location / เพราะ specific กว่า)
    # --------------------------------------------------------
    location ~ ^/api/v1/.*/stream$ {
        proxy_pass http://schoolorbit-backend-school:8081;
        # 🔥 SSE Configuration - ปิด buffering ทั้งหมด
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;          # timeout นาน ๆ เพราะ stream อาจใช้เวลา
        proxy_connect_timeout 60s;
        proxy_send_timeout 24h;
        
        # HTTP/1.1 และ chunked transfer encoding
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
        
        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS Headers สำหรับ SSE
        add_header 'Access-Control-Allow-Origin' $allow_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        # จัดการ Preflight Request
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # --------------------------------------------------------
    # NORMAL API ENDPOINTS
    # --------------------------------------------------------
    location / {
        proxy_pass http://schoolorbit-backend-school:8081;

        # เพิ่ม file size limit สำหรับ API อื่นๆ ด้วย (เผื่อมี API อื่นที่ต้องรับไฟล์)
        client_max_body_size 5M;
        
        # --------------------------------------------------------
        # 2. CORS HEADER SECTION: ดึงค่าจาก MAP มาใช้
        # --------------------------------------------------------
        
        # ใส่ค่าที่ได้จาก Map ลงไป (ถ้าไม่ผ่านกฎ ค่าจะเป็นว่าง Browser จะบล็อกเอง)
        add_header 'Access-Control-Allow-Origin' $allow_origin always;
        
        # อนุญาตให้ส่ง Cookie/Auth Token ได้ (สำคัญมากสำหรับ Admin API)
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # จัดการ Preflight Request (OPTIONS)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Proxy Headers ปกติ
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
