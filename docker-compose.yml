version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: schoolorbit-postgres
    environment:
      POSTGRES_USER: schoolorbit_provisioner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-provisioner-password}
      POSTGRES_DB: postgres
      ADMIN_APP_PASSWORD: ${ADMIN_APP_PASSWORD:-local-admin-app-password}
      TENANT_OWNER_PASSWORD: ${TENANT_OWNER_PASSWORD:-local-tenant-owner-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres_roles.sh:/docker-entrypoint-initdb.d/01-init-schoolorbit.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U schoolorbit_provisioner -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - schoolorbit-network

  backend-admin:
    build:
      context: ./backend-admin
      dockerfile: Dockerfile
    container_name: schoolorbit-backend-admin
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - DATABASE_URL=${DATABASE_URL:-postgresql://schoolorbit_admin_app:local-admin-app-password@postgres:5432/schoolorbit_admin?sslmode=disable}
      - SELF_HOSTED_POSTGRES_ADMIN_URL=${SELF_HOSTED_POSTGRES_ADMIN_URL:-postgresql://schoolorbit_provisioner:local-provisioner-password@postgres:5432/postgres?sslmode=disable}
      - SELF_HOSTED_POSTGRES_APP_HOST=${SELF_HOSTED_POSTGRES_APP_HOST:-postgres}
      - SELF_HOSTED_POSTGRES_APP_PORT=${SELF_HOSTED_POSTGRES_APP_PORT:-5432}
      - SELF_HOSTED_POSTGRES_TENANT_USER=${SELF_HOSTED_POSTGRES_TENANT_USER:-schoolorbit_tenant_owner}
      - SELF_HOSTED_POSTGRES_TENANT_PASSWORD=${SELF_HOSTED_POSTGRES_TENANT_PASSWORD:-local-tenant-owner-password}
      - SELF_HOSTED_POSTGRES_SSLMODE=${SELF_HOSTED_POSTGRES_SSLMODE:-disable}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-internal-secret-change-this}
      - BACKEND_SCHOOL_URL=${BACKEND_SCHOOL_URL:-http://backend-school:8081}
      # Cloudflare (ใช้ในการ deploy worker — ใน local dev อาจละไว้ได้)
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
      - BASE_DOMAIN=${BASE_DOMAIN:-schoolorbit.app}
      - API_URL=${API_URL:-https://school-api.schoolorbit.app}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-akephisit/schoolorbit-new}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-akephisit/schoolorbit-new}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - schoolorbit-network
    restart: unless-stopped

  backend-school:
    build:
      context: ./backend-school
      dockerfile: Dockerfile
    container_name: schoolorbit-backend-school
    ports:
      - "8081:8081"
    environment:
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=8081
      # ไม่มี ADMIN_DATABASE_URL แล้ว — ใช้ HTTP ผ่าน backend-admin แทน
      - BACKEND_ADMIN_URL=${BACKEND_ADMIN_URL:-http://backend-admin:8080}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-internal-secret-change-this}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-encryption-key-in-production}
      - BLIND_INDEX_KEY=${BLIND_INDEX_KEY:-change-this-blind-index-key-in-production}
      - DEPLOY_KEY=${DEPLOY_KEY:-local-dev-key-change-me}
      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-schoolorbit-files}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_REGION=${R2_REGION:-auto}
      - AWS_REGION=auto
      - CDN_URL=${CDN_URL:-}
      # File Upload Limits
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_PROFILE_IMAGE_SIZE_MB=${MAX_PROFILE_IMAGE_SIZE_MB:-5}
      - MAX_DOCUMENT_SIZE_MB=${MAX_DOCUMENT_SIZE_MB:-20}
      - ALLOWED_IMAGE_TYPES=${ALLOWED_IMAGE_TYPES:-jpg,jpeg,png,webp,gif}
      - ALLOWED_DOCUMENT_TYPES=${ALLOWED_DOCUMENT_TYPES:-pdf,doc,docx,xls,xlsx}
      # Web Push
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@schoolorbit.app}
    depends_on:
      postgres:
        condition: service_healthy
      backend-admin:
        condition: service_healthy
    networks:
      - schoolorbit-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  schoolorbit-network:
    driver: bridge
